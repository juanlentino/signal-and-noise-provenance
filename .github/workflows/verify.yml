name: Verify public provenance

on:
  push:
  pull_request:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

# A backfill can publish many immutable records in quick succession. Keep only
# the newest verification for a branch; the scheduled run remains an
# independent full-ledger check.
concurrency:
  group: provenance-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run verify:genesis
      - run: npm run verify:keys
      - run: npm run verify:key-pins
      - run: npm run verify:coverage
      - run: npm run verify:pages
