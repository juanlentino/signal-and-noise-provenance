name: Verify public provenance

on:
  push:
  pull_request:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

# A backfill can publish many immutable records in quick succession. Keep only
# the newest verification for a branch; the scheduled run remains an
# independent full-ledger check.
concurrency:
  group: provenance-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run verify:records
      - run: npm run verify:genesis
      - run: npm run verify:keys
      - run: npm run verify:key-pins
      - run: npm run verify:coverage
      - run: npm run verify:pages
